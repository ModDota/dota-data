name: Publish
on:
  push:
    tags: '*'

permissions:
  id-token: write  # Required for trusted publishing
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@moddota'
      - run: npm ci
      - run: npm publish
